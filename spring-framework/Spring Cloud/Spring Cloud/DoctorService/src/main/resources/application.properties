#spring.application.name=DOCTOR-SERVICE
#
#server.port=8082

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka

## Enables Circuit Breaker support for Feign clients to prevent cascading failures when a service is down.
#spring.cloud.openfeign.circuitbreaker.enabled=true
#
## Opens the circuit if 50% or more of the requests to userService fail.
#resilience4j.circuitbreaker.instances.userService.failure-rate-threshold=50
#
## Circuit breaker will start evaluating failure rate only after at least 50 calls have been made.
#resilience4j.circuitbreaker.instances.userService.minimum-number-of-calls=5
#
## After the circuit opens (service considered unhealthy), it will wait 10 seconds before trying again.
#resilience4j.circuitbreaker.instances.userService.wait-duration-in-open-state=10s
#
## When moving to HALF-OPEN state, only 3 trial requests are allowed to check if the service has recovered.
#resilience4j.circuitbreaker.instances.userService.permitted-number-of-calls-in-half-open-state=3
#
#management.endpoints.web.exposure.include=*
#management.endpoint.health.show-details=always